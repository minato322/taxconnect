      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });

        return new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
      }
      return new Date();
    };

    dates.forEach(d => {
      const cur = parseDate(d);
      if (!minDate || cur < minDate) minDate = cur;
      if (!maxDate || cur > maxDate) maxDate = cur;
    });
    const formatDateShort = (date) => {
      if (!date) return '';
      const day = date.getDate();
      const month = date.getMonth() + 1;

      btn.addEventListener('click', () => {
        // 额外提供聚合确认动画效果，同时展示清单
        showCustomsDeclarationSummary();
        // 额外提示音效模拟？不影响功能，同时更新引擎状态卡片微光效
        const engineDiv = document.querySelector('.flow-item.engine');
        if (engineDiv) {
          engineDiv.style.transition = '0.2s';
          engineDiv.style.backgroundColor = '#fff3cd';
          setTimeout(() => { engineDiv.style.backgroundColor = '#fff9c4'; }, 300);
        }
      });
    }
  }
  
  // 附加功能：展示订单总数量和聚合前校验提示（完全满足32笔）
  function initDataConsistency() {
    if (ORDERS_DATA.length !== 32) {
      console.warn(`⚠️ 当前订单数量: ${ORDERS_DATA.length}，预期32笔，请检查补充数据`);
    } else {
      console.log('🎉 数据校验通过：32笔真实交易订单已加载 (广州原锦科技)');
    }
    // 额外挂载到window方便调试
    window.__ordersData = ORDERS_DATA;
  }
  
  // 初始化页面: 渲染 + 绑定事件
  function init() {
    renderOrders();
    bindAggregateEvent();
    initDataConsistency();
    // 动态重新绑定聚合流区域内的按钮(渲染后已存在监听，但再次确保)
    const flowDeclareBtn = document.getElementById('dynamicDeclareBtn');
    if (flowDeclareBtn) {
      flowDeclareBtn.addEventListener('click', (e) => {
        e.preventDefault();
        showCustomsDeclarationSummary();
      });
    }
  }
  
  // 启动
  init();
</script>
</body>
</html>
